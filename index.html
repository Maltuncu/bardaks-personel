<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>bardak's — Personel</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --cream:#F5F0E4;--cream2:#EAE4D4;--cream3:#D8D0BE;
  --ink:#1B2B4B;--ink2:#2D3F6B;--ink3:#7A849A;
  --navy:#1B4B8A;--navy2:#2560B0;--navy3:#EBF1FA;
  --gold:#C9A84C;--gold2:#E8C96A;
  --green:#1B5E3B;--green2:#2D8A5E;--green3:#E8F5EE;
  --red:#C0392B;--red2:#FDECEA;
  --amber:#92600A;--amber2:#FDF3E3;
  --blue:#1B4B8A;--blue2:#EBF1FA;
  --shadow:0 1px 8px rgba(27,43,75,.08);
  --r:16px;--r-sm:12px;--r-xs:8px;
}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--ink);min-height:100vh;max-width:430px;margin:0 auto;overflow-x:hidden}
.pin-wrap{min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#1B4B8A;padding:48px 32px;position:relative;overflow:hidden}
.pin-ring{position:absolute;border-radius:50%;border:1px solid rgba(201,168,76,.1);pointer-events:none}
.pin-brand{text-align:center;margin-bottom:52px;z-index:1;position:relative}
.pin-brand-name{font-family:'Playfair Display',serif;font-size:44px;color:#fff;letter-spacing:-2px;line-height:1}
.pin-brand-line{width:44px;height:1px;background:rgba(255,255,255,.4);margin:12px auto 10px}
.pin-brand-tag{font-size:11px;color:rgba(255,255,255,.6);letter-spacing:3px;text-transform:uppercase;font-style:italic;font-weight:400}
.pin-who{font-size:11px;color:rgba(255,255,255,.4);letter-spacing:2px;text-transform:uppercase;margin-bottom:28px}
.pin-dots{display:flex;gap:18px;margin-bottom:44px}
.pin-dot{width:13px;height:13px;border-radius:50%;border:1.5px solid rgba(255,255,255,.2);transition:.25s cubic-bezier(.34,1.56,.64,1)}
.pin-dot.filled{background:#fff;border-color:#fff;transform:scale(1.15)}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:252px}
.pin-btn{height:68px;border-radius:20px;border:1px solid rgba(255,255,255,.07);font-size:24px;font-weight:40
